<!DOCTYPE html>

<html len="en">
    
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="design.css">
        <script src="design.js"></script>
    </head>
    

    <body>
        
        <div class="layout">
            <h1 id="todoList"> To-do List </h1>
        
            <hr>
            <br>

            <table border="1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Completed</th>
                    </tr>
                </thead>
                <tbody id="taskTable">
                </tbody>
            </table>
        
            <div id="controls">

                <h3> Task Actions </h3>

                <input type="text" id="taskTitle" placeholder="Task Title">
                <button id="addBtn">Add Task</button>


                <input type="number" id="taskID" placeholder="Task ID">
                <button id="completeBtn">Complete Task</button>
                <button id="deleteBtn">Delete task</button>

            </div>
            
        </div>

    </body>

</html>
